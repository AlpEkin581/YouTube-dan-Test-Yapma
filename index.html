<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alptech | Quiz AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFCF8; font-family: sans-serif; }
        
        /* Neubrutalism Kart Stili */
        .nb-card {
            background: white;
            border: 3px solid black;
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        /* Başlıklar */
        .nb-label {
            font-weight: 900;
            text-transform: uppercase;
            color: #4B5563;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Inputlar */
        .nb-input {
            width: 100%;
            padding: 12px;
            border: 2px solid black;
            border-radius: 10px;
            font-weight: 600;
            outline: none;
        }
        .nb-input:focus { border-color: #FFE358; }

        /* Sarı Buton */
        .nb-btn {
            width: 100%;
            background-color: #FFE358;
            border: 3px solid black;
            padding: 18px;
            font-weight: 900;
            font-size: 20px;
            border-radius: 16px;
            box-shadow: 5px 5px 0px 0px rgba(0,0,0,1);
            cursor: pointer;
            transition: all 0.1s;
        }
        .nb-btn:active {
            box-shadow: none;
            transform: translate(3px, 3px);
        }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto">

    <h1 class="text-center font-black text-xl mb-6 uppercase italic">Alptech | Fullstack App</h1>

    <div class="nb-card border-dashed border-gray-400">
        <label class="nb-label text-gray-400">🔑 Gemini API Key (Kodun içine yazıldı)</label>
        <input type="password" id="apiKey" placeholder="Artık buraya yazmana gerek yok!" class="nb-input bg-gray-100" disabled>
    </div>

    <div class="nb-card">
        <label class="nb-label">
            <span style="background:#FFE358; border:2px solid black; padding:4px; border-radius:6px;">▶️</span>
            YouTube Video Linki
        </label>
        <input type="text" id="ytUrl" placeholder="https://www.youtube.com..." class="nb-input">
    </div>

    <div class="nb-card">
        <label class="nb-label" id="countLabel">Soru Sayısı: 10</label>
        <input type="range" id="qCount" min="1" max="20" value="10" class="w-full accent-black" 
               oninput="document.getElementById('countLabel').innerText = 'Soru Sayısı: ' + this.value">
    </div>

    <button class="nb-btn" onclick="generateQuiz()">✨ SINAV OLUŞTUR</button>

    <div id="result" class="mt-8 hidden">
        <div class="nb-card border-dashed bg-yellow-50">
            <h3 class="font-black mb-2 uppercase">Sınav Soruların:</h3>
            <div id="quizContent" class="text-sm space-y-4"></div>
        </div>
    </div>

    <script>
        async function generateQuiz() {
            // !!! KEYİ YAZMAN GEREKEN YER BURASI !!! (Aşağıdaki satırı silip kendi keyini yapıştır)
            const key = "AIzaSyClvb1o5z2DVZI3bI8wLnAm18lr7G4-SX0"; 
            
            const url = document.getElementById('ytUrl').value;
            const count = document.getElementById('qCount').value;

            if(!url) return alert("Lütfen YouTube linkini gir!");
            if(key === "AIzaSyClvb1o5z2DVZI3bI8wLnAm18lr7G4-SX0") return alert("Lütfen kodun içindeki API Key kısmını kendi anahtarınla değiştir!");

            const btn = document.querySelector('.nb-btn');
            btn.innerText = "⏳ OLUŞTURULUYOR...";
            
            try {
                // Not: Tarayıcı üzerinden doğrudan YouTube altyazısı çekmek zordur (CORS).
                // Bu örnekte Gemini'ye doğrudan URL verip analiz etmesini istiyoruz.
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Bu YouTube videosunu analiz et (${url}) ve içeriği hakkında tam olarak ${count} adet çoktan seçmeli (A,B,C,D şıklı) Türkçe soru hazırla. Soruların sonunda doğru cevapları da belirt.`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('quizContent').innerText = aiText;
                btn.innerText = "✨ SINAV OLUŞTUR";

            } catch (error) {
                alert("Bir hata oluştu. API anahtarını veya internet bağlantını kontrol et!");
                console.error(error);
                btn.innerText = "✨ SINAV OLUŞTUR";
            }
        }
    </script>
</body>
</html>
