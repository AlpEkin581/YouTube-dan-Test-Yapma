<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergent | YouTube Quiz AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFCF8; font-family: 'Inter', sans-serif; }
        .nb-card {
            background: white; border: 3px solid black;
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            padding: 24px; border-radius: 20px; margin-bottom: 24px;
        }
        .nb-label { font-weight: 900; text-transform: uppercase; color: #374151; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .nb-input { width: 100%; padding: 14px; border: 2.5px solid black; border-radius: 12px; font-weight: 600; outline: none; transition: 0.2s; }
        .nb-input:focus { border-color: #FFE358; background-color: #FFFEF0; }
        .nb-btn {
            width: 100%; background-color: #FFE358; border: 3px solid black;
            padding: 20px; font-weight: 900; font-size: 20px; border-radius: 20px;
            box-shadow: 5px 5px 0px 0px rgba(0,0,0,1); cursor: pointer; transition: 0.1s;
        }
        .nb-btn:active { box-shadow: none; transform: translate(3px, 3px); }
        #loading { display: none; text-align: center; font-weight: 800; margin-top: 10px; }
    </style>
</head>
<body class="p-6 max-w-xl mx-auto">

    <h1 class="text-center font-black text-2xl mb-8 uppercase italic tracking-tighter">Emergent | Quiz AI</h1>

    <div class="nb-card border-red-500">
        <label class="nb-label text-red-600">🔑 Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AI Studio'dan aldığın keyi yapıştır..." class="nb-input">
    </div>

    <div class="nb-card">
        <label class="nb-label">
            <span class="bg-[#FFE358] border-2 border-black p-1 rounded-md">📺</span> 
            YouTube Video Linki
        </label>
        <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=..." class="nb-input">
    </div>

    <div class="nb-card">
        <label class="nb-label" id="countLabel">Soru Sayısı: 5</label>
        <input type="range" id="qCount" min="1" max="15" value="5" class="w-full accent-black cursor-pointer" 
               oninput="document.getElementById('countLabel').innerText = 'Soru Sayısı: ' + this.value">
    </div>

    <button class="nb-btn" id="mainBtn" onclick="startQuiz()">✨ SINAV OLUŞTUR</button>
    <div id="loading">⏳ Yapay zeka videoyu izliyor...</div>

    <div id="resultArea" class="mt-8 hidden">
        <div class="nb-card bg-green-50">
            <h3 class="font-black text-xl mb-4 border-b-2 border-black pb-2 uppercase">📝 Sınavın Hazır!</h3>
            <div id="quizContent" class="space-y-6 font-medium"></div>
        </div>
    </div>

    <script>
        async function startQuiz() {
            const key = "AIzaSyClvb1o5z2DVZI3bI8wLnAm18lr7G4-SX0"
            const url = document.getElementById('ytUrl').value;
            const count = document.getElementById('qCount').value;
            const btn = document.getElementById('mainBtn');
            const loading = document.getElementById('loading');

            if(!key || !url) return alert("Lütfen hem API anahtarını hem de linki gir!");

            btn.style.display = 'none';
            loading.style.display = 'block';

            try {
                // Not: Tarayıcıdan doğrudan altyazı çekmek CORS engeline takılır.
                // Bu örnekte Gemini'ye doğrudan URL verip analiz etmesini istiyoruz.
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Bu YouTube videosunu analiz et (${url}) ve içeriği hakkında tam olarak ${count} adet çoktan seçmeli (A,B,C,D şıklı) Türkçe soru hazırla. Soruların sonunda doğru cevapları da belirt.`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('quizContent').innerText = aiText;
                
            } catch (error) {
                alert("Bir hata oluştu. API anahtarını kontrol et!");
                console.error(error);
            } finally {
                btn.style.display = 'block';
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
